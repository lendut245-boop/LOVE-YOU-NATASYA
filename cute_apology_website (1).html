<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>I'm Sorry ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(rgba(255,192,203,0.15), rgba(255,182,193,0.10)),
                  url('https://images.unsplash.com/photo-1523438097201-512ae7d59c1a?auto=format&fit=crop&w=1920&q=80');
      background-size: cover;
      background-position: center;
      overflow: hidden;
    }

    .hearts {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      width: 18px;
      height: 18px;
      background: #ff4d6d;
      transform: rotate(45deg);
      animation: float 7s linear infinite;
      opacity: 0.7;
    }

    .heart::before,
    .heart::after{
      content:'';
      position:absolute;
      width:18px;
      height:18px;
      background:#ff4d6d;
      border-radius:50%;
    }

    .heart::before{top:-9px;left:0}
    .heart::after{left:-9px;top:0}

    @keyframes float{
      0%{transform:translateY(100vh) rotate(45deg);opacity:0}
      10%{opacity:0.8}
      100%{transform:translateY(-10vh) rotate(45deg);opacity:0}
    }

    .page {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: 0.5s ease;
      transform: scale(1.05);
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .envelope {
      font-size: 90px;
      cursor: pointer;
      animation: floatEnv 2.2s ease-in-out infinite;
      z-index: 3;
    }

    @keyframes floatEnv {
      0% { transform: translateY(0); }
      50% { transform: translateY(-18px); }
      100% { transform: translateY(0); }
    }

    .card {
      background: rgba(255,255,255,0.92);
      padding: 45px;
      border-radius: 25px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.25);
      max-width: 550px;
      border: 3px dashed #ff9eb3;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    h1 { color:#ff4d6d; font-size:32px; }
    p { color:#555; font-size:18px; min-height:60px; }

    button {
      margin-top:20px;
      padding:12px 26px;
      border:none;
      border-radius:30px;
      background:linear-gradient(45deg,#ff4d6d,#ff758f);
      color:white;
      cursor:pointer;
    }

    button:active { transform: scale(0.92); }

    .btn-row{display:flex;gap:10px;margin-top:20px}

    #noBtn{
      position: fixed;
      top: 60%;
      left: 55%;
      z-index: 99999;
      transition: 0.15s ease;
    }

    .side-img{
      position:absolute;
      width:160px;
      height:160px;
      object-fit:cover;
      border-radius:18px;
      border:4px solid white;
      box-shadow:0 10px 25px rgba(0,0,0,.25);
      z-index:1;
    }

    .img1{top:60px;left:60px}
    .img2{top:60px;right:60px}
    .img3{bottom:60px;left:60px}
    .img4{bottom:60px;right:60px}

    .love-burst{
      position:fixed;
      inset:0;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      background:rgba(0,0,0,0.5);
      z-index:9999;
      color:white;
    }

    .big-heart{font-size:90px;animation:beat 1s infinite;}
    @keyframes beat{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
  </style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="page active" id="start">
  <div class="envelope" onclick="nextPage()">💌</div>
</div>

<div class="page" id="page1">
  <img src="sayang abang 1.jpg" class="side-img img1">
  <img src="img2.jpg" class="side-img img2">
  <img src="img3.jpg" class="side-img img3">
  <img src="img4.jpg" class="side-img img4">
  <div class="card">
    <h1>Abang minta maaf sayang... ❤️</h1>
    <p>Abang betul-betul menyesal.</p>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<div class="page" id="page2">
  <img src="img1.jpg" class="side-img img1">
  <img src="img2.jpg" class="side-img img2">
  <img src="img3.jpg" class="side-img img3">
  <img src="img4.jpg" class="side-img img4">
  <div class="card">
    <h1>Maafkan abang 🥺</h1>
    <p>Abang tak sanggup nak biar sayang tak okay lama-lama macamni.</p>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<div class="page" id="page3">
  <img src="img1.jpg" class="side-img img1">
  <img src="img2.jpg" class="side-img img2">
  <img src="img3.jpg" class="side-img img3">
  <img src="img4.jpg" class="side-img img4">
  <div class="card">
    <h1>Abang rindu sayang abang 💔</h1>
    <p>Abang rindu sayang abang yang cantik,comel dan manja ni gembira dengan abang.</p>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<div class="page" id="final">
  <div class="card">
    <h1>Maafkan abang ye sayang ? ❤️</h1>
    <div class="btn-row">
      <button onclick="yes()">Yes ❤️</button>
      <button id="noBtn" onmouseenter="runAway()" ontouchstart="runAway()">No 💔</button>
    </div>
  </div>
</div>

<script>
  let current = 0;
  const pages = ["start","page1","page2","page3","final"];

  function showPage(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function nextPage(){
    current++;
    if(current < pages.length){
      showPage(pages[current]);
    }
  }

  function runAway(){
    const b=document.getElementById('noBtn');
    const w=b.offsetWidth;
    const h=b.offsetHeight;
    const x=Math.random()*(window.innerWidth-w);
    const y=Math.random()*(window.innerHeight-h);
    b.style.left=x+'px';
    b.style.top=y+'px';
  }

  function yes(){
    const d=document.createElement('div');
    d.className='love-burst';
    d.innerHTML='<div class="big-heart">❤️</div><h1>Terima kasih sayang... I love you so much <3</h1>';
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),3000);
  }

  const c=document.getElementById('hearts');
  for(let i=0;i<25;i++){
    let h=document.createElement('div');
    h.className='heart';
    h.style.left=Math.random()*100+'vw';
    h.style.animationDuration=(Math.random()*5+5)+'s';
    c.appendChild(h);
  }
</script>

</body>
</html>
